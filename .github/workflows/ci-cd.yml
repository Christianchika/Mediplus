name: CI/CD - Build, Push to ECR, Trigger ArgoCD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: mediplus
  IMAGE_TAG: ${{ github.run_number }}
  ECR_REGISTRY: 503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${IMAGE_TAG} .

      - name: Tag Docker Image
        run: docker tag $IMAGE_NAME:${IMAGE_TAG} ${{ env.ECR_REGISTRY }}:${IMAGE_TAG}

      - name: Push Docker Image to ECR
        run: docker push ${{ env.ECR_REGISTRY }}:${IMAGE_TAG}

      - name: Update image tag in deployment
        run: |
          sed -i "s|503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus:.*|503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus:${IMAGE_TAG}|g" kubernetes-manifest/deployment.yaml

      - name: Commit and push updated deployment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Christianchika/Mediplus.git
          git add kubernetes-manifest/deployment.yaml
          git commit -m "Update image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push origin main

  sync-argocd:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Trigger Argo CD sync
        run: |
          echo "ArgoCD will auto-sync via GitOps on new commit"
























