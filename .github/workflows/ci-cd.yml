name: CI/CD - Mediplus Full Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: mediplus
  IMAGE_TAG: ${{ github.run_number }}
  ECR_REGISTRY: 503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus
  REGION: eu-north-1
  K8S_NAMESPACE: default
  DEPLOYMENT_NAME: mediplus-deployment
  GITOPS_REPO: https://github.com/Christianchika/kubernetes-manifest.git
  CLUSTER_NAME: mediplus
  INGRESS_HOST: mypodsix.online
  CERT_EMAIL: okoro.christianpeace@gmail.com

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${IMAGE_TAG} .

      - name: Tag Docker Image
        run: docker tag $IMAGE_NAME:${IMAGE_TAG} $ECR_REGISTRY:${IMAGE_TAG}

      - name: Push Docker Image to ECR
        run: docker push $ECR_REGISTRY:${IMAGE_TAG}

  update-deployment:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Clone kubernetes-manifest repo
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/Christianchika/kubernetes-manifest.git
          cd kubernetes-manifest

          # Update Docker image tag in deployment.yaml
          sed -i "s|503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus:.*|503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus:${IMAGE_TAG}|g" deployment.yaml

          git config user.email "${CERT_EMAIL}"
          git config user.name "${GIT_USERNAME}"
          git add deployment.yaml
          git commit -m "Update Mediplus image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/Christianchika/kubernetes-manifest.git HEAD:main

  setup-cert-manager:
    runs-on: ubuntu-latest
    needs: update-deployment
    steps:
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash

      - name: Add Jetstack repo
        run: helm repo add jetstack https://charts.jetstack.io && helm repo update

      - name: Install cert-manager CRDs
        run: kubectl apply -f https://github.com/jetstack/cert-manager/releases/download/v1.15.0/cert-manager.crds.yaml

      - name: Install cert-manager via Helm
        run: helm upgrade --install cert-manager jetstack/cert-manager --namespace cert-manager --create-namespace --version v1.15.0

      - name: Create ClusterIssuer
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: ${CERT_EMAIL}
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
              - http01:
                  ingress:
                    class: nginx
          EOF

  verify-rollout:
    runs-on: ubuntu-latest
    needs: setup-cert-manager
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.30.0'

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region $REGION --name $CLUSTER_NAME

      - name: Verify Deployment Rollout
        run: kubectl rollout status deployment/${DEPLOYMENT_NAME} -n ${K8S_NAMESPACE}

      - name: Check Ingress and TLS
        run: |
          kubectl get ingress -n ${K8S_NAMESPACE}
          kubectl describe certificate mediplus-tls -n ${K8S_NAMESPACE}



























