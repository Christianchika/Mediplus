name: CI/CD - Mediplus Full Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: mediplus
  IMAGE_TAG: ${{ github.run_number }}
  ECR_REGISTRY: 503640389215.dkr.ecr.eu-north-1.amazonaws.com/mediplus
  REGION: eu-north-1
  GITOPS_REPO: https://github.com/Christianchika/kubernetes-manifest.git
  CERT_EMAIL: okoro.christianpeace@gmail.com

jobs:
  # -------------------------------
  # 1️⃣ Build & Push Docker Image
  # -------------------------------
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${IMAGE_TAG} .

      - name: Tag Docker Image
        run: docker tag $IMAGE_NAME:${IMAGE_TAG} $ECR_REGISTRY:${IMAGE_TAG}

      - name: Push Docker Image to ECR
        run: docker push $ECR_REGISTRY:${IMAGE_TAG}

  # -------------------------------
  # 2️⃣ Update Kubernetes Manifest
  # -------------------------------
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Clone Kubernetes Manifest Repo
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/Christianchika/kubernetes-manifest.git
          cd kubernetes-manifest

          # Update Docker image tag in mediplus-full.yaml
          sed -i "s|\(503640389215\.dkr\.ecr\.eu-north-1\.amazonaws\.com/mediplus:\)[^[:space:]]*|\1${IMAGE_TAG}|g" mediplus-full.yaml

          git config user.email "${CERT_EMAIL}"
          git config user.name "${GIT_USERNAME}"
          git add mediplus-full.yaml
          git commit -m "Update Mediplus image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/Christianchika/kubernetes-manifest.git HEAD:main





























