name: CI - Build and Push Docker Image to Public ECR

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: mediplus
  IMAGE_TAG: ${{ github.run_number }}
  ECR_REGISTRY: public.ecr.aws/l7i2q7k7

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1   # Public ECR only supports us-east-1

      # 🔹 Login to Public ECR
      - name: Log in to Amazon Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      # 🔹 Build and Push Image
      - name: Build and Push Docker Image to Public ECR
        run: |
          docker build -t $IMAGE_NAME:${IMAGE_TAG} .
          docker tag $IMAGE_NAME:${IMAGE_TAG} ${ECR_REGISTRY}/$IMAGE_NAME:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/$IMAGE_NAME:${IMAGE_TAG}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Connect to EC2 and Deploy
        run: |
          echo "${{ secrets.SSH_KEY }}" > mykey.pem
          chmod 600 mykey.pem
          ssh -o StrictHostKeyChecking=no -i mykey.pem ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            docker pull ${ECR_REGISTRY}/$IMAGE_NAME:${IMAGE_TAG} &&
            docker rm -f medplus || true &&
            docker run -d --name medplus -p 80:80 ${ECR_REGISTRY}/$IMAGE_NAME:${IMAGE_TAG}
          "



  







