name: ci  build and push docker image to ECR

on:
  push:

env:
  IMAGE_NAME: medplus
  IMAGE_TAG: ${{ github.run_number }}          # <-- git run number as tag
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}    # <-- set this secret (no hard-coded number)

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push Docker image to ECR
        run: |
          docker build -t $IMAGE_NAME:${IMAGE_TAG} .
          docker tag $IMAGE_NAME:${IMAGE_TAG} ${ECR_REGISTRY}/$IMAGE_NAME:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/$IMAGE_NAME:${IMAGE_TAG}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Create SSH key file
        run: |
          echo "${{ secrets.SSH_KEY }}" > mykey.pem
          chmod 600 mykey.pem

      - name: Deploy to app EC2 (pull & restart container)
        run: |
          SSH_USER=${{ secrets.SSH_USER }}
          SSH_HOST=${{ secrets.SSH_HOST }}
          IMAGE=${{ env.ECR_REGISTRY }}/medplus:${{ env.IMAGE_TAG }}

          ssh -o StrictHostKeyChecking=no -i mykey.pem $SSH_USER@$SSH_HOST << 'EOF'
            set -e
            echo "Pulling image $IMAGE"
            docker pull $IMAGE
            echo "Stopping old container (if any)"
            docker rm -f medplus || true
            echo "Starting new container"
            docker run -d --name medplus --restart=always -p 80:80 $IMAGE
            echo "Deployment complete"
          EOF

      - name: Cleanup key
        run: rm -f mykey.pem


  







