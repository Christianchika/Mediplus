name: Deploy Mediplus to K3s on AWS

on:
  push:
    branches:
      - main

env:
  DOMAIN_NAME: mypodsix.online
  EMAIL: okoro.christianpeace@gmail.com
  AWS_REGION: eu-north-1
  K8S_REPO: https://github.com/Christianchika/kubernetes-manifest.git

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Terraform apply
      - name: Terraform Apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve

      # Get Elastic IP
      - id: getip
        run: |
          cd infra
          echo "IP=$(terraform output -raw elastic_ip)" >> $GITHUB_ENV

      # Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      # Configure SSH
      - name: Configure SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa

      # Install K3s + Traefik
      - name: Install K3s
        run: |
          ssh -o StrictHostKeyChecking=no -i id_rsa ubuntu@${{ env.IP }} \
          "curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC='--write-kubeconfig-mode 644 --tls-san ${{ env.DOMAIN_NAME }} --disable=servicelb --disable=metrics-server' sh -"

      # Copy kubeconfig
      - name: Copy kubeconfig
        run: |
          scp -o StrictHostKeyChecking=no -i id_rsa ubuntu@${{ env.IP }}:/etc/rancher/k3s/k3s.yaml ./k3s.yaml
          sed -i "s/127.0.0.1/${{ env.IP }}/g" k3s.yaml
          export KUBECONFIG=$PWD/k3s.yaml

      # Install Cert-Manager
      - name: Install Cert-Manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml --kubeconfig=k3s.yaml
          sleep 60

      # Wait for DNS propagation
      - name: Wait for DNS propagation
        run: |
          echo "Waiting for DNS ${DOMAIN_NAME} to resolve..."
          while ! nslookup $DOMAIN_NAME >/dev/null 2>&1; do
            echo "DNS not yet propagated, sleeping 10s..."
            sleep 10
          done

      # Apply ClusterIssuer
      - name: Apply ClusterIssuer
        shell: bash
        run: |
          cat <<'EOF' > clusterissuer.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: okoro.christianpeace@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: traefik
        
        EOF:
         kubectl apply -f clusterissuer.yaml --kubeconfig=k3s.yaml

      # Deploy Mediplus manifests
      - name: Deploy Mediplus manifests
        run: |
          git clone $K8S_REPO manifests
          sed -i "s/DOMAIN_PLACEHOLDER/$DOMAIN_NAME/g" manifests/deployment.yaml
          sed -i "s/EMAIL_PLACEHOLDER/$EMAIL/g" manifests/deployment.yaml
          kubectl apply -f manifests/deployment.yaml --kubeconfig=k3s.yaml

      # Verify Deployment
      - name: Verify Deployment
        run: |
          kubectl get nodes --kubeconfig=k3s.yaml
          kubectl get pods -A --kubeconfig=k3s.yaml
          kubectl get ingress --kubeconfig=k3s.yaml    


















